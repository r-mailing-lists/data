name: Update Data

on:
  schedule:
    # Run daily at 6 AM UTC — after archive repos update (2-3 AM UTC)
    - cron: '0 6 * * *'
  repository_dispatch:
    types: [archive-updated]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (ignore data hash check)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull processed data from archive repos
        run: |
          mkdir -p data/processed

          while IFS=$'\t' read -r name url type desc; do
            [[ "$name" =~ ^#.*$ ]] && continue
            [ -z "$name" ] && continue
            echo "Pulling data for $name..."
            git clone --depth 1 --filter=blob:none --sparse \
              "https://github.com/r-mailing-lists/$name.git" \
              "data/tmp-$name" 2>/dev/null || continue
            cd "data/tmp-$name"
            git sparse-checkout init --no-cone
            git sparse-checkout set /processed /meta.json /index.json /message-order.json /contributors.json
            git checkout
            cd ../..
            if [ -d "data/tmp-$name/processed" ]; then
              mv "data/tmp-$name/processed" "data/processed/$name"
            fi
            for f in meta.json index.json message-order.json contributors.json; do
              if [ -f "data/tmp-$name/$f" ]; then
                mkdir -p "data/processed/$name"
                cp "data/tmp-$name/$f" "data/processed/$name/$f"
              fi
            done
            rm -rf "data/tmp-$name"
          done < scripts/lists.conf

      - name: Compute data hash
        id: data-hash
        run: |
          HASH=$(find data/processed -name '*.json' -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Data hash: $HASH"

      - name: Check if rebuild is needed
        id: check-hash
        if: github.event_name == 'schedule' && inputs.force_rebuild != true
        run: |
          HASH="${{ steps.data-hash.outputs.hash }}"
          LAST_HASH=$(gh release view last-data-build --repo "${{ github.repository }}" --json body --jq '.body' 2>/dev/null || echo "none")
          echo "Current hash: $HASH"
          echo "Last build hash: $LAST_HASH"
          if [ "$HASH" = "$LAST_HASH" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Data unchanged — skipping rebuild"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Data changed — rebuilding"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup R
        if: steps.check-hash.outputs.skip != 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R dependencies
        if: steps.check-hash.outputs.skip != 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::nanoparquet
            any::dplyr
            any::scales
            any::ggplot2
            any::igraph
            any::ggraph
            any::knitr
            any::rmarkdown

      - name: Download rmail-parser
        if: steps.check-hash.outputs.skip != 'true'
        run: |
          curl -sL -o rmail-parser \
            "https://github.com/r-mailing-lists/rmail-parser/releases/latest/download/rmail-parser-linux-x86_64"
          chmod +x rmail-parser

      - name: Download aliases
        if: steps.check-hash.outputs.skip != 'true'
        run: |
          curl -sL -o aliases.json \
            "https://raw.githubusercontent.com/r-mailing-lists/rmail-parser/main/aliases.json" \
            2>/dev/null || echo '{"aliases":[]}' > aliases.json

      - name: Aggregate contributors
        if: steps.check-hash.outputs.skip != 'true'
        run: ./rmail-parser aggregate --input data/processed --output data/processed/_contributors.json --aliases aliases.json

      - name: Build parquet files
        if: steps.check-hash.outputs.skip != 'true'
        run: Rscript scripts/build-parquet.R data/processed data aliases.json

      - name: Setup Quarto
        if: steps.check-hash.outputs.skip != 'true'
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render README and analysis
        if: steps.check-hash.outputs.skip != 'true'
        run: |
          quarto render README.qmd
          quarto render analysis/demo-analysis.qmd

      - name: Commit and push
        if: steps.check-hash.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ README.md README_files/ analysis/ 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: update parquet files and README $(date -u +%Y-%m-%d)"
          git push

      - name: Save build hash
        if: steps.check-hash.outputs.skip != 'true'
        run: |
          HASH="${{ steps.data-hash.outputs.hash }}"
          gh release delete last-data-build --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create last-data-build \
            --repo "${{ github.repository }}" \
            --title "Last successful data build" \
            --notes "$HASH"
          echo "Saved build hash: $HASH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
